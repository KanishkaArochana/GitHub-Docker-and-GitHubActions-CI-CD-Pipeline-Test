name: CI/CD with Node.js & Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: |
          cd nodeApp
          npm install

      - name: Run tests
        run: |
          cd nodeApp
          npm test

      - name: Build Docker Image
        run: docker build -t thimira123/nodeapp-cuban:${{ github.run_number }} .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u thimira123 --password-stdin

      - name: Push Docker Image
        run: docker push thimira123/nodeapp-cuban:${{ github.run_number }}
